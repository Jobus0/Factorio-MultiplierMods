[mod-name]
TechnologyPriceMultiplier=기술 가격 배율

[mod-description]
TechnologyPriceMultiplier=소수점 배율(0.5배, 1.2배 등)을 통해 기술 비용을 정밀하게 조정하여, 정수만 지원하는 바닐라 게임의 설정보다 세밀한 제어를 제공합니다. 무한 기술 및 티어별 비용 스케일링을 위한 고급 옵션도 포함되어 있습니다.

[mod-setting-name]
TechnologyPriceMultiplier-price-factor=가격 배율
TechnologyPriceMultiplier-price-exponent-factor=무한 기술의 가격 성장 배율
TechnologyPriceMultiplier-price-tier-scaling-factor=티어별 가격 스케일링 배율
TechnologyPriceMultiplier-price-tier-scaling-curve=티어별 가격 스케일링 곡선
TechnologyPriceMultiplier-price-tier-scaling-start=티어별 가격 스케일링 시작 티어

[mod-setting-description]
TechnologyPriceMultiplier-price-factor=무한 기술을 포함한 모든 기술의 최종 과학 팩 비용을 조정합니다. 배율이 0.5이면 모든 기술의 비용이 절반으로 줄어듭니다.
TechnologyPriceMultiplier-price-exponent-factor=무한 기술의 과학 팩 비용 성장 곡선을 조정합니다. 배율이 0.5이면 무한 기술의 레벨당 비용 증가량이 절반으로 줄어듭니다.
TechnologyPriceMultiplier-price-tier-scaling-factor=요구되는 새로운 과학 팩 티어마다 기술 비용을 기하급수적으로 증가시킵니다. 배율이 2이면 다음 티어마다 비용이 2배, 4배, 8배 등으로 증가합니다. 역효과를 내기 위해 1.0 미만으로 설정할 수 있습니다.
TechnologyPriceMultiplier-price-tier-scaling-curve=지수적 티어별 비용 스케일링의 곡선을 조정합니다. 1.0 미만(예: 0.8)의 값은 높은 티어에서 곡선을 완만하게 만들어, 게임 후반부에 비용이 극단적으로 치솟는 것을 방지하고 가격 상승폭을 완화합니다.
TechnologyPriceMultiplier-price-tier-scaling-start=가격 스케일링 효과가 시작되는 과학 팩 티어입니다. 예를 들어, 3으로 설정하면 1티어 및 2티어 과학 팩만 요구하는 기술은 영향을 받지 않으며, 3티어 과학 팩을 요구하는 기술부터 스케일링이 시작됩니다.