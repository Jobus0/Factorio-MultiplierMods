[mod-name]
TechnologyPriceMultiplier=Multiplicador del coste de tecnologías

[mod-description]
TechnologyPriceMultiplier=Ajusta con precisión los costes de las tecnologías con multiplicadores decimales (0.5x, 1.2x, etc.), ofreciendo un control detallado que supera el ajuste de solo enteros del juego base. También incluye opciones avanzadas para tecnologías infinitas y escalado de costes basado en niveles.

[mod-setting-name]
TechnologyPriceMultiplier-price-factor=Factor de coste
TechnologyPriceMultiplier-price-exponent-factor=Factor de crecimiento del coste de tecnologías infinitas
TechnologyPriceMultiplier-price-tier-scaling-factor=Factor de escalado del coste por nivel
TechnologyPriceMultiplier-price-tier-scaling-curve=Curva de escalado del coste por nivel
TechnologyPriceMultiplier-price-tier-scaling-start=Inicio del escalado del coste por nivel

[mod-setting-description]
TechnologyPriceMultiplier-price-factor=Ajusta el coste final en paquetes de ciencia de todas las tecnologías, incluyendo las tecnologías infinitas. Un factor de 0.5 significa que todas las tecnologías costarán la mitad.
TechnologyPriceMultiplier-price-exponent-factor=Ajusta la curva de crecimiento para el coste en paquetes de ciencia de las tecnologías infinitas. Un factor de 0.5 significa que el coste de las tecnologías infinitas aumentará la mitad por cada nivel.
TechnologyPriceMultiplier-price-tier-scaling-factor=Incrementa exponencialmente el coste de las tecnologías por cada nuevo nivel de paquetes de ciencia requerido. Un factor de 2 resulta en costes de 2x, 4x, 8x, etc., para cada nivel subsiguiente. Puede ser inferior a 1.0 para obtener el efecto inverso.
TechnologyPriceMultiplier-price-tier-scaling-curve=Ajusta la curva del escalado exponencial de costes basado en niveles. Un factor menor que 1.0 (por ejemplo, 0.8) hace que la curva se suavice en los niveles superiores, haciendo que el salto de precio sea menos severo para evitar costes extremos en la etapa final del juego.
TechnologyPriceMultiplier-price-tier-scaling-start=El nivel de paquetes de ciencia en el que comienza el efecto de escalado de costes. Por ejemplo, un ajuste de 3 significa que las tecnologías que solo requieren paquetes de ciencia de nivel 1 y 2 no se verán afectadas, y el escalado comenzará con las tecnologías que requieran paquetes de ciencia de nivel 3.