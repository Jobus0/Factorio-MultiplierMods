[mod-name]
TechnologyPriceMultiplier=テクノロジー価格倍率

[mod-description]
TechnologyPriceMultiplier=小数点以下の倍率（0.5倍、1.2倍など）でテクノロジーコストを正確に微調整でき、バニラの整数のみの設定を超えたきめ細かな制御を可能にします。また、無限テクノロジーやティアごとのコストスケーリングに関する高度なオプションも含んでいます。

[mod-setting-name]
TechnologyPriceMultiplier-price-factor=価格係数
TechnologyPriceMultiplier-price-exponent-factor=無限テクノロジーの価格上昇係数
TechnologyPriceMultiplier-price-tier-scaling-factor=ティア別価格スケーリング係数
TechnologyPriceMultiplier-price-tier-scaling-curve=ティア別価格スケーリング曲線
TechnologyPriceMultiplier-price-tier-scaling-start=ティア別価格スケーリング開始レベル

[mod-setting-description]
TechnologyPriceMultiplier-price-factor=無限テクノロジーを含むすべてのテクノロジーの最終的なサイエンスパックコストを調整します。係数を0.5にすると、すべてのテクノロジーのコストが半分になります。
TechnologyPriceMultiplier-price-exponent-factor=無限テクノロジーのサイエンスパックコストの上昇曲線を調整します。係数を0.5にすると、無限テクノロジーのレベルごとのコスト上昇幅が半分になります。
TechnologyPriceMultiplier-price-tier-scaling-factor=必要とされる新しいサイエンスパックのティアごとに、テクノロジーコストを指数関数的に増加させます。係数が2の場合、後続のティアごとにコストが2倍、4倍、8倍...になります。1.0未満に設定すると、逆の効果になります。
TechnologyPriceMultiplier-price-tier-scaling-curve=指数関数的なティア別コストスケーリングの曲線を調整します。1.0未満の係数（例：0.8）にすると、高次のティアで曲線が緩やかになり、ゲーム終盤での極端なコストを避けるために価格の急上昇が抑えられます。
TechnologyPriceMultiplier-price-tier-scaling-start=価格スケーリング効果が開始されるサイエンスパックのティアです。例えば、設定を3にすると、ティア1およびティア2のサイエンスパックのみを必要とするテクノロジーは影響を受けず、ティア3のサイエンスパックを必要とするテクノロジーからスケーリングが開始されます。