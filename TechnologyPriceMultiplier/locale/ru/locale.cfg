[mod-name]
TechnologyPriceMultiplier=Множитель стоимости технологий

[mod-description]
TechnologyPriceMultiplier=Точная настройка стоимости технологий с помощью дробных множителей (0,5x, 1,2x и т. д.), обеспечивающая более тонкий контроль, чем стандартная настройка игры, поддерживающая только целые числа. Также включает расширенные параметры для бесконечных технологий и масштабирования стоимости на основе уровней.

[mod-setting-name]
TechnologyPriceMultiplier-price-factor=Множитель стоимости
TechnologyPriceMultiplier-price-exponent-factor=Множитель роста стоимости бесконечных технологий
TechnologyPriceMultiplier-price-tier-scaling-factor=Множитель масштабирования стоимости по уровням
TechnologyPriceMultiplier-price-tier-scaling-curve=Кривая масштабирования стоимости по уровням
TechnologyPriceMultiplier-price-tier-scaling-start=Начало масштабирования стоимости по уровням

[mod-setting-description]
TechnologyPriceMultiplier-price-factor=Регулирует конечную стоимость в исследовательских пакетах для всех технологий, включая бесконечные. Множитель 0,5 означает, что все технологии будут стоить в два раза меньше.
TechnologyPriceMultiplier-price-exponent-factor=Регулирует кривую роста стоимости в исследовательских пакетах для бесконечных технологий. Множитель 0,5 означает, что прирост стоимости бесконечных технологий за каждый уровень уменьшится в два раза.
TechnologyPriceMultiplier-price-tier-scaling-factor=Экспоненциально увеличивает стоимость технологий за каждый новый требуемый уровень исследовательских пакетов. Множитель 2 приводит к увеличению стоимости в 2x, 4x, 8x и т. д. для каждого последующего уровня. Может быть меньше 1,0 для обратного эффекта.
TechnologyPriceMultiplier-price-tier-scaling-curve=Регулирует кривую экспоненциального масштабирования стоимости по уровням. Множитель меньше 1,0 (например, 0,8) сглаживает кривую на более высоких уровнях, делая скачок стоимости менее резким, чтобы избежать экстремальных затрат на поздних этапах игры.
TechnologyPriceMultiplier-price-tier-scaling-start=Уровень исследовательских пакетов, с которого начинается масштабирование стоимости. Например, значение 3 означает, что технологии, требующие только исследовательские пакеты 1-го и 2-го уровней, не изменятся, а масштабирование начнется с технологий, требующих пакеты 3-го уровня.