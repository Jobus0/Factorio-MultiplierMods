[mod-name]
TechnologyPriceMultiplier=Multiplicador de Custo de Tecnologia

[mod-description]
TechnologyPriceMultiplier=Ajuste com precisão os custos de tecnologia com multiplicadores decimais (0,5x, 1,2x, etc.), oferecendo um controle refinado além da configuração padrão do jogo que aceita apenas números inteiros. Também inclui opções avançadas para tecnologias infinitas e escalonamento de custo por nível.

[mod-setting-name]
TechnologyPriceMultiplier-price-factor=Fator de custo
TechnologyPriceMultiplier-price-exponent-factor=Fator de crescimento do custo de tecnologias infinitas
TechnologyPriceMultiplier-price-tier-scaling-factor=Fator de escalonamento de custo por nível
TechnologyPriceMultiplier-price-tier-scaling-curve=Curva de escalonamento de custo por nível
TechnologyPriceMultiplier-price-tier-scaling-start=Início do escalonamento de custo por nível

[mod-setting-description]
TechnologyPriceMultiplier-price-factor=Ajusta o custo final em pacotes científicos de todas as tecnologias, incluindo tecnologias infinitas. Um fator de 0,5 significa que todas as tecnologias custarão metade do valor original.
TechnologyPriceMultiplier-price-exponent-factor=Ajusta a curva de crescimento do custo em pacotes científicos de tecnologias infinitas. Um fator de 0,5 significa que o custo das tecnologias infinitas aumentará metade do valor por nível.
TechnologyPriceMultiplier-price-tier-scaling-factor=Aumenta exponencialmente o custo da tecnologia para cada novo nível de pacote científico exigido. Um fator de 2 resulta em custos de 2x, 4x, 8x, etc., para cada nível subsequente. Pode ser menor que 1,0 para obter o efeito inverso.
TechnologyPriceMultiplier-price-tier-scaling-curve=Ajusta a curva do escalonamento de custo exponencial baseado em níveis. Um fator menor que 1,0 (ex: 0,8) faz com que a curva se estabilize nos níveis mais altos, tornando o salto de preço menos severo para evitar custos extremos no final do jogo.
TechnologyPriceMultiplier-price-tier-scaling-start=O nível de pacote científico no qual o efeito de escalonamento de custo começa. Por exemplo, uma configuração de 3 significa que tecnologias que exigem apenas pacotes científicos de Nível 1 e 2 não são afetadas, e o escalonamento começa com tecnologias que exigem pacotes científicos de Nível 3.