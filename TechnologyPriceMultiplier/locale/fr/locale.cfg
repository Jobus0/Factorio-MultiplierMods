[mod-name]
TechnologyPriceMultiplier=Multiplicateur du coût des technologies

[mod-description]
TechnologyPriceMultiplier=Ajustez précisément le coût des technologies avec des multiplicateurs décimaux (0,5x, 1,2x, etc.), offrant un contrôle plus précis que le réglage en nombres entiers du jeu de base. Comprend également des options avancées pour les technologies infinies et la progression des coûts par palier.

[mod-setting-name]
TechnologyPriceMultiplier-price-factor=Facteur de coût
TechnologyPriceMultiplier-price-exponent-factor=Facteur de croissance du coût des technologies infinies
TechnologyPriceMultiplier-price-tier-scaling-factor=Facteur de progression du coût par palier
TechnologyPriceMultiplier-price-tier-scaling-curve=Courbe de progression du coût par palier
TechnologyPriceMultiplier-price-tier-scaling-start=Début de la progression du coût par palier

[mod-setting-description]
TechnologyPriceMultiplier-price-factor=Ajuste le coût final en packs de science de toutes les technologies, y compris les technologies infinies. Un facteur de 0,5 signifie que toutes les technologies coûtent moitié moins cher.
TechnologyPriceMultiplier-price-exponent-factor=Ajuste la courbe de croissance du coût en packs de science pour les technologies infinies. Un facteur de 0,5 signifie que le coût des technologies infinies augmentera deux fois moins vite par niveau.
TechnologyPriceMultiplier-price-tier-scaling-factor=Augmente de manière exponentielle le coût de la technologie pour chaque nouveau palier de packs de science requis. Un facteur de 2 entraîne des coûts de 2x, 4x, 8x, etc., pour chaque palier suivant. Peut être inférieur à 1,0 pour obtenir l'effet inverse.
TechnologyPriceMultiplier-price-tier-scaling-curve=Ajuste la courbe de progression exponentielle des coûts par palier. Un facteur inférieur à 1,0 (par exemple, 0,8) permet d'amortir la courbe sur les paliers supérieurs, rendant le bond des coûts moins sévère pour éviter des coûts extrêmes en fin de partie.
TechnologyPriceMultiplier-price-tier-scaling-start=Le palier de packs de science à partir duquel l'effet de progression des coûts commence. Par exemple, un réglage de 3 signifie que les technologies ne nécessitant que des packs de science de paliers 1 et 2 ne sont pas affectées, et que la progression commence avec les technologies nécessitant des packs de science de palier 3.