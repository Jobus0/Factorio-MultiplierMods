[mod-name]
RoboportRangeMultiplier=ロボットステーション範囲倍率

[mod-description]
RoboportRangeMultiplier=シンプルな倍率設定を使用して、すべてのロボットステーションの物流範囲、建設範囲、およびレーダー範囲をグローバルに調整します。

[mod-setting-name]
RoboportRangeMultiplier-logistics-range-factor=物流範囲倍率
RoboportRangeMultiplier-construction-range-factor=建設範囲倍率
RoboportRangeMultiplier-personal-construction-range-factor=携帯用建設範囲倍率
RoboportRangeMultiplier-radar-range-factor=ロボットステーションレーダー範囲倍率

[mod-setting-description]
RoboportRangeMultiplier-personal-construction-range-factor=携帯ロボットステーションの建設範囲を調整します。
RoboportRangeMultiplier-radar-range-factor=1.0のとき、レーダー範囲は物流エリアと建設エリアの両方をカバーするようにチャンク単位（切り上げ）でスケーリングされます。レーダー範囲をそれらのエリアより広く、または狭くしたい場合は、この倍率を調整してください。0に設定すると、ロボットステーションにレーダー機能がなくなります。