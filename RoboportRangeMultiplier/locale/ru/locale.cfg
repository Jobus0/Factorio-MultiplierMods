[mod-name]
RoboportRangeMultiplier=Множитель зоны действия дронстанций

[mod-description]
RoboportRangeMultiplier=Глобальное изменение логистической зоны, зоны строительства и зоны действия радара всех дронстанций с помощью простых множителей.

[mod-setting-name]
RoboportRangeMultiplier-logistics-range-factor=Множитель логистической зоны
RoboportRangeMultiplier-construction-range-factor=Множитель зоны строительства
RoboportRangeMultiplier-personal-construction-range-factor=Множитель зоны строительства персональной дронстанции
RoboportRangeMultiplier-radar-range-factor=Множитель зоны радара дронстанции

[mod-setting-description]
RoboportRangeMultiplier-personal-construction-range-factor=Изменяет зону строительства персональных дронстанций.
RoboportRangeMultiplier-radar-range-factor=При значении 1.0 зона действия радара масштабируется так, чтобы полностью покрывать как логистическую зону, так и зону строительства (с округлением в большую сторону до чанков). Измените этот коэффициент, если хотите сделать зону радара больше или меньше этих областей. При значении 0 у дронстанций не будет радара.