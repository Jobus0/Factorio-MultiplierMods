[mod-name]
RoboportRangeMultiplier=Multiplicateur de portée des roboports

[mod-description]
RoboportRangeMultiplier=Ajustez globalement les portées logistiques, de construction et de radar de tous les roboports à l'aide de simples multiplicateurs.

[mod-setting-name]
RoboportRangeMultiplier-logistics-range-factor=Facteur de portée logistique
RoboportRangeMultiplier-construction-range-factor=Facteur de portée de construction
RoboportRangeMultiplier-personal-construction-range-factor=Facteur de portée de construction personnelle
RoboportRangeMultiplier-radar-range-factor=Facteur de portée radar des roboports

[mod-setting-description]
RoboportRangeMultiplier-personal-construction-range-factor=Ajuste la portée de construction des équipements de roboport personnel.
RoboportRangeMultiplier-radar-range-factor=À 1.0, la portée du radar s'adapte pour couvrir à la fois les zones de logistique et de construction, arrondie au tronçon supérieur. Ajustez ce facteur si vous souhaitez que la portée du radar soit plus grande ou plus petite que ces zones. À 0, les roboports n'auront pas de radar.