[mod-name]
RoboportRangeMultiplier=Multiplicador de alcance de robopuertos

[mod-description]
RoboportRangeMultiplier=Modifica de forma global el alcance de logística, construcción y radar de todos los robopuertos usando multiplicadores sencillos.

[mod-setting-name]
RoboportRangeMultiplier-logistics-range-factor=Factor de alcance de logística
RoboportRangeMultiplier-construction-range-factor=Factor de alcance de construcción
RoboportRangeMultiplier-personal-construction-range-factor=Factor de alcance de construcción personal
RoboportRangeMultiplier-radar-range-factor=Factor de alcance del radar del robopuerto

[mod-setting-description]
RoboportRangeMultiplier-personal-construction-range-factor=Ajusta el alcance de construcción del equipamiento de robopuerto personal.
RoboportRangeMultiplier-radar-range-factor=Con un valor de 1.0, el alcance del radar se escala para cubrir tanto el área de logística como la de construcción, redondeando hacia arriba en sectores. Ajusta este factor si quieres que el alcance del radar sea mayor o menor que esas áreas. Con un valor de 0, los robopuertos no tendrán radar.