[mod-name]
RoboportRangeMultiplier=Multiplicador de Alcance de Roboport

[mod-description]
RoboportRangeMultiplier=Ajuste globalmente os alcances de logística, construção e radar de todos os roboports usando multiplicadores simples.

[mod-setting-name]
RoboportRangeMultiplier-logistics-range-factor=Fator do alcance de logística
RoboportRangeMultiplier-construction-range-factor=Fator do alcance de construção
RoboportRangeMultiplier-personal-construction-range-factor=Fator do alcance de construção pessoal
RoboportRangeMultiplier-radar-range-factor=Fator do alcance de radar do roboport

[mod-setting-description]
RoboportRangeMultiplier-personal-construction-range-factor=Ajusta o alcance de construção do equipamento de roboport pessoal.
RoboportRangeMultiplier-radar-range-factor=Em 1.0, o alcance do radar é dimensionado para cobrir tanto a área de logística quanto a de construção, arredondado para cima em chunks. Ajuste este fator se desejar que o alcance do radar seja maior ou menor do que essas áreas. Em 0, os roboports não terão radar.