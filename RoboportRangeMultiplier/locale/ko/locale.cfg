[mod-name]
RoboportRangeMultiplier=로보포트 범위 배율

[mod-description]
RoboportRangeMultiplier=간단한 배율을 사용하여 모든 로보포트의 물류, 건설 및 레이더 범위를 전역적으로 조정합니다.

[mod-setting-name]
RoboportRangeMultiplier-logistics-range-factor=물류 범위 배율
RoboportRangeMultiplier-construction-range-factor=건설 범위 배율
RoboportRangeMultiplier-personal-construction-range-factor=개인용 건설 범위 배율
RoboportRangeMultiplier-radar-range-factor=로보포트 레이더 범위 배율

[mod-setting-description]
RoboportRangeMultiplier-personal-construction-range-factor=개인용 로보포트 장비의 건설 범위를 조정합니다.
RoboportRangeMultiplier-radar-range-factor=1.0일 때, 레이더 범위는 물류 및 건설 영역을 모두 포함할 수 있도록 청크 단위로 올림하여 조정됩니다. 레이더 범위를 해당 영역보다 더 크게 또는 작게 설정하려면 이 배율을 조정하세요. 0으로 설정하면 로보포트에 레이더 기능이 제공되지 않습니다.