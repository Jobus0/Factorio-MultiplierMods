[mod-name]
RobotPowerMultiplier=로봇 전력 배율기

[mod-description]
RobotPowerMultiplier=모든 물류 및 건설 로봇의 성능을 전역적으로 세부 조정합니다. 간단한 배율을 사용하여 속도, 에너지 용량, 충전 속도 및 전력 소비량을 조정할 수 있습니다.

[mod-setting-name]
RobotPowerMultiplier-robot-max-energy-factor=에너지 용량 배율
RobotPowerMultiplier-robot-charging-energy-factor=에너지 충전 배율
RobotPowerMultiplier-robot-movement-energy-consumption-factor=에너지 소비 배율
RobotPowerMultiplier-robot-speed-factor=속도 배율
RobotPowerMultiplier-robot-approach-distance-factor=대기열 거리 배율

[mod-setting-description]
RobotPowerMultiplier-robot-max-energy-factor=배율이 높을수록 로봇이 재충전하기 전에 더 멀리 이동할 수 있지만, 로보포트에서 충전하는 데 더 많은 시간이 걸립니다.
RobotPowerMultiplier-robot-charging-energy-factor=배율이 높을수록 로봇이 로보포트에서 더 빠르게 충전됩니다.
RobotPowerMultiplier-robot-movement-energy-consumption-factor=배율이 낮을수록 로봇이 에너지를 덜 소비하여 재충전하기 전에 더 멀리 비행할 수 있습니다.
RobotPowerMultiplier-robot-speed-factor=배율이 높을수록 로봇이 더 빠르게 이동하지만, 이동 거리당 소비하는 에너지 양은 동일하므로 최대 이동 거리에는 영향을 주지 않습니다.
RobotPowerMultiplier-robot-approach-distance-factor=배율이 낮을수록 로봇이 충전 대기 시 로보포트에 더 가깝게 대기하므로, 대기 시간이 단축되어 전반적인 충전 속도가 향상됩니다.