[mod-name]
RobotPowerMultiplier=Multiplicador de potencia de los robots

[mod-description]
RobotPowerMultiplier=Modifica globalmente el rendimiento de todos los robots logísticos y de construcción. Ajusta su velocidad, capacidad de energía, tasa de carga y consumo de energía usando multiplicadores sencillos.

[mod-setting-name]
RobotPowerMultiplier-robot-max-energy-factor=Factor de capacidad de energía
RobotPowerMultiplier-robot-charging-energy-factor=Factor de carga de energía
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Factor de consumo de energía
RobotPowerMultiplier-robot-speed-factor=Factor de velocidad
RobotPowerMultiplier-robot-approach-distance-factor=Factor de distancia de cola

[mod-setting-description]
RobotPowerMultiplier-robot-max-energy-factor=Un factor más alto significa que los robots pueden viajar más lejos antes de necesitar recargarse, pero tardarán más tiempo en recargarse en los robopuertos.
RobotPowerMultiplier-robot-charging-energy-factor=Un factor más alto significa que los robots se recargan más rápido en los robopuertos.
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Un factor más bajo hace que los robots consuman menos energía, lo que les permite volar más lejos antes de necesitar recargarse.
RobotPowerMultiplier-robot-speed-factor=Un factor más alto significa que los robots se mueven más rápido, pero seguirán consumiendo la misma cantidad de energía por metro, por lo que no afecta a la distancia máxima de viaje.
RobotPowerMultiplier-robot-approach-distance-factor=Un factor más bajo hace que los robots esperen más cerca del robopuerto mientras hacen cola para recargarse, lo que resulta en una gestión de colas más eficiente y una recarga global más rápida.