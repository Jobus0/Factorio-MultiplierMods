[mod-name]
RobotPowerMultiplier=Multiplicateur de puissance des robots

[mod-description]
RobotPowerMultiplier=Modifie globalement les performances de tous les robots logistiques et de construction. Ajustez leur vitesse, leur capacité énergétique, leur taux de recharge et leur consommation d'énergie à l'aide de simples multiplicateurs.

[mod-setting-name]
RobotPowerMultiplier-robot-max-energy-factor=Facteur de capacité énergétique
RobotPowerMultiplier-robot-charging-energy-factor=Facteur de vitesse de recharge
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Facteur de consommation d'énergie
RobotPowerMultiplier-robot-speed-factor=Facteur de vitesse
RobotPowerMultiplier-robot-approach-distance-factor=Facteur de distance de file d'attente

[mod-setting-description]
RobotPowerMultiplier-robot-max-energy-factor=Un facteur plus élevé signifie que les robots peuvent voyager plus loin avant de devoir se recharger, mais prennent plus de temps à se recharger dans les roboports.
RobotPowerMultiplier-robot-charging-energy-factor=Un facteur plus élevé signifie que les robots se rechargent plus rapidement dans les roboports.
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Un facteur plus bas permet aux robots de consommer moins d'énergie, leur permettant de voler plus loin avant de devoir se recharger.
RobotPowerMultiplier-robot-speed-factor=Un facteur plus élevé signifie que les robots se déplacent plus vite, mais consommeront toujours la même quantité d'énergie par mètre, cela n'affecte donc pas la distance maximale de trajet.
RobotPowerMultiplier-robot-approach-distance-factor=Un facteur plus bas permet aux robots d'attendre plus près du roboport lorsqu'ils font la queue pour se recharger, ce qui rend l'attente plus efficace et accélère la recharge globale.