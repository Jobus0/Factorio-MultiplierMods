[mod-name]
RobotPowerMultiplier=Множитель характеристик дронов

[mod-description]
RobotPowerMultiplier=Глобальная настройка эффективности всех транспортных и строительных дронов. Настраивайте их скорость, энергоёмкость, скорость зарядки и энергопотребление с помощью простых множителей.

[mod-setting-name]
RobotPowerMultiplier-robot-max-energy-factor=Множитель энергоёмкости
RobotPowerMultiplier-robot-charging-energy-factor=Множитель скорости зарядки
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Множитель энергопотребления
RobotPowerMultiplier-robot-speed-factor=Множитель скорости
RobotPowerMultiplier-robot-approach-distance-factor=Множитель дистанции очереди

[mod-setting-description]
RobotPowerMultiplier-robot-max-energy-factor=Более высокое значение означает, что дроны могут летать дальше без подзарядки, но им требуется больше времени для зарядки на дронстанциях.
RobotPowerMultiplier-robot-charging-energy-factor=Более высокое значение означает, что дроны заряжаются быстрее на дронстанциях.
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Более низкое значение снижает потребление энергии дронами, позволяя им летать дальше перед тем, как потребуется подзарядка.
RobotPowerMultiplier-robot-speed-factor=Более высокое значение означает, что дроны двигаются быстрее, но при этом расходуют то же количество энергии на метр пути, так что это не влияет на максимальную дальность полёта.
RobotPowerMultiplier-robot-approach-distance-factor=Более низкое значение заставляет дронов ждать ближе к дронстанции во время нахождения в очереди на зарядку, что приводит к более эффективному распределению времени в очереди и в целом к более быстрой зарядке.