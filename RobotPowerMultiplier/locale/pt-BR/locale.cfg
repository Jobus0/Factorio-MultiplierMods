[mod-name]
RobotPowerMultiplier=Multiplicador de Energia dos Robôs

[mod-description]
RobotPowerMultiplier=Ajuste globalmente o desempenho de todos os robôs logísticos e construtores. Ajuste a velocidade, capacidade de energia, taxa de recarga e consumo de energia usando multiplicadores simples.

[mod-setting-name]
RobotPowerMultiplier-robot-max-energy-factor=Fator de capacidade de energia
RobotPowerMultiplier-robot-charging-energy-factor=Fator de recarga de energia
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Fator de consumo de energia
RobotPowerMultiplier-robot-speed-factor=Fator de velocidade
RobotPowerMultiplier-robot-approach-distance-factor=Fator de distância da fila

[mod-setting-description]
RobotPowerMultiplier-robot-max-energy-factor=Um fator mais alto significa que os robôs podem viajar mais longe antes de precisarem recarregar, mas levarão mais tempo para recarregar nos roboports.
RobotPowerMultiplier-robot-charging-energy-factor=Um fator mais alto significa que os robôs recarregam mais rápido nos roboports.
RobotPowerMultiplier-robot-movement-energy-consumption-factor=Um fator mais baixo faz com que os robôs consumam menos energia, permitindo que voem mais longe antes de precisarem recarregar.
RobotPowerMultiplier-robot-speed-factor=Um fator mais alto significa que os robôs se movem mais rápido, mas ainda consumirão a mesma quantidade de energia por metro, portanto, não afeta a distância máxima de viagem.
RobotPowerMultiplier-robot-approach-distance-factor=Um fator mais baixo faz com que os robôs esperem mais perto do roboport enquanto aguardam na fila para recarregar, resultando em uma fila mais eficiente e em uma recarga geral mais rápida.