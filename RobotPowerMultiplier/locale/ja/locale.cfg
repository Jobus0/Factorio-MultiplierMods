[mod-name]
RobotPowerMultiplier=ロボットパワーマルチプライヤー

[mod-description]
RobotPowerMultiplier=すべての物流ロボットと建設ロボットの性能をグローバルに微調整します。シンプルな倍率を使用して、移動速度、最大エネルギー容量、充電速度、消費電力を調整できます。

[mod-setting-name]
RobotPowerMultiplier-robot-max-energy-factor=エネルギー容量倍率
RobotPowerMultiplier-robot-charging-energy-factor=充電速度倍率
RobotPowerMultiplier-robot-movement-energy-consumption-factor=消費電力倍率
RobotPowerMultiplier-robot-speed-factor=移動速度倍率
RobotPowerMultiplier-robot-approach-distance-factor=充電待ち距離倍率

[mod-setting-description]
RobotPowerMultiplier-robot-max-energy-factor=値を大きくすると、ロボットが充電を必要とするまでに移動できる距離が伸びますが、ロボットステーションでの充電に時間がかかるようになります。
RobotPowerMultiplier-robot-charging-energy-factor=値を大きくすると、ロボットステーションでのロボットの充電速度が速くなります。
RobotPowerMultiplier-robot-movement-energy-consumption-factor=値を小さくすると、ロボットの消費エネルギーが少なくなり、充電が必要になるまでに飛行できる距離が伸びます。
RobotPowerMultiplier-robot-speed-factor=値を大きくすると、ロボットの移動速度が上がります。ただし、1メートルあたりの消費エネルギーは変わらないため、最大飛行距離には影響しません。
RobotPowerMultiplier-robot-approach-distance-factor=値を小さくすると、ロボットが充電待ちの列に並ぶ際、ロボットステーションにより近づいて待機するようになり、列の巡回効率が向上して全体的な充電時間が短縮されます。