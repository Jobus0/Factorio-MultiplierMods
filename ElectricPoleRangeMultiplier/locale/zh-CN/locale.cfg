[mod-name]
ElectricPoleRangeMultiplier=电线杆范围倍率

[mod-description]
ElectricPoleRangeMultiplier=通过乘数调整所有电杆和配电站的范围。供应区域和电线范围都受到影响。不能超过64。

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=范围倍数
ElectricPoleRangeMultiplier-maximum-gap=最大间隙

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=应用于所有电线杆的供电范围和连接距离的乘数。
ElectricPoleRangeMultiplier-maximum-gap=限制最大电线距离，防止供电区域之间的间隙超过此数值。可设为 0（或 0.5）以实现拖拽建造时完美无缝铺设。