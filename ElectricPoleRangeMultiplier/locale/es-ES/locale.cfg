[mod-name]
ElectricPoleRangeMultiplier=Multiplicador de alcance de postes eléctricos

[mod-description]
ElectricPoleRangeMultiplier=Ajusta de forma global el alcance de todos los postes eléctricos y subestaciones, incluidos los de otros mods, mediante un multiplicador sencillo.

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=Factor de alcance
ElectricPoleRangeMultiplier-maximum-gap=Separación máxima

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=Multiplicador aplicado al área de cobertura y a la distancia del cable de todos los postes eléctricos.
ElectricPoleRangeMultiplier-maximum-gap=Limita la distancia del cable para evitar que los huecos sin energía entre las áreas de cobertura superen este valor. Establécelo en 0 (o 0.5 para tener cierto margen diagonal) para permitir la colocación al hacer clic y arrastrar sin dejar huecos.