[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=Range factor
ElectricPoleRangeMultiplier-maximum-gap=Maximum gap

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=Multiplier applied to the supply area and wire distance of all electric poles.
ElectricPoleRangeMultiplier-maximum-gap=Caps the wire distance to prevent unpowered gaps between supply areas from exceeding this value. Set to 0 (or 0.5 for some diagonal leeway) to allow click-and-drag placing without gaps.