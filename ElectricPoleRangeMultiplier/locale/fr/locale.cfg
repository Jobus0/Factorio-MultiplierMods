[mod-name]
ElectricPoleRangeMultiplier=Multiplicateur de portée des poteaux électriques

[mod-description]
ElectricPoleRangeMultiplier=Ajuste globalement la portée de tous les poteaux électriques et sous-stations, y compris ceux d'autres mods, à l'aide d'un simple multiplicateur.

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=Facteur de portée
ElectricPoleRangeMultiplier-maximum-gap=Écart maximal

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=Multiplicateur appliqué à la zone d'alimentation et à la longueur des câbles de tous les poteaux électriques.
ElectricPoleRangeMultiplier-maximum-gap=Limite la longueur des câbles pour éviter que les espaces non alimentés entre les zones d'alimentation ne dépassent cette valeur. Réglez sur 0 (ou 0.5 pour une marge de manœuvre en diagonale) pour permettre le placement par cliquer-glisser sans espace vide.