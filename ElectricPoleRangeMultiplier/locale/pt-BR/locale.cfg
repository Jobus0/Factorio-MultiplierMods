[mod-name]
ElectricPoleRangeMultiplier=Multiplicador de Alcance de Postes Elétricos

[mod-description]
ElectricPoleRangeMultiplier=Ajuste globalmente o alcance de todos os postes elétricos e subestações, incluindo os de outros mods, usando um multiplicador simples.

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=Fator de alcance
ElectricPoleRangeMultiplier-maximum-gap=Lacuna máxima

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=Multiplicador aplicado à área de cobertura e à distância do fio de todos os postes elétricos.
ElectricPoleRangeMultiplier-maximum-gap=Limita a distância do fio para evitar que lacunas sem energia entre as áreas de cobertura excedam este valor. Defina como 0 (ou 0,5 para alguma margem na diagonal) para permitir a construção por clique e arraste sem deixar lacunas.