[mod-name]
ElectricPoleRangeMultiplier=전신주 범위 배율

[mod-description]
ElectricPoleRangeMultiplier=간단한 배율을 사용하여 다른 모드의 전신주와 변전소를 포함한 모든 전신주의 범위를 전역적으로 조정합니다.

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=범위 배율
ElectricPoleRangeMultiplier-maximum-gap=최대 간격

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=모든 전신주의 공급 영역 및 전선 거리에 적용되는 배율입니다.
ElectricPoleRangeMultiplier-maximum-gap=공급 영역 사이에 전력이 공급되지 않는 간격이 이 값을 초과하지 않도록 전선 거리를 제한합니다. 간격 없이 클릭 후 드래그하여 배치하려면 0(또는 대각선 여유를 두려면 0.5)으로 설정하세요.