[mod-name]
ElectricPoleRangeMultiplier=電柱の範囲倍率

[mod-description]
ElectricPoleRangeMultiplier=他のMODのものを含む、すべての電柱と変電所の範囲を、シンプルな倍率設定で一括調整します。

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=範囲倍率
ElectricPoleRangeMultiplier-maximum-gap=最大隙間

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=すべての電柱の供給エリアと配線距離に適用される倍率です。
ElectricPoleRangeMultiplier-maximum-gap=供給エリア間に電力が届かない隙間ができるのを防ぐため、配線距離の上限を制限します。0（斜め配置用の余裕を持たせる場合は0.5）に設定すると、隙間を作らずにクリック＆ドラッグで電柱を配置できるようになります。