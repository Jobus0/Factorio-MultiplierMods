[mod-name]
ElectricPoleRangeMultiplier=Множитель дальности опор ЛЭП

[mod-description]
ElectricPoleRangeMultiplier=Глобально изменяет дальность всех опор ЛЭП и подстанций (включая добавленные другими модами) с помощью простого множителя.

[mod-setting-name]
ElectricPoleRangeMultiplier-range-factor=Множитель дальности
ElectricPoleRangeMultiplier-maximum-gap=Максимальный зазор

[mod-setting-description]
ElectricPoleRangeMultiplier-range-factor=Множитель, применяемый к области покрытия и длине провода всех опор ЛЭП.
ElectricPoleRangeMultiplier-maximum-gap=Ограничивает максимальную длину провода, чтобы неэлектрифицированные зазоры между областями покрытия не превышали это значение. Установите значение 0 (или 0.5 для запаса по диагонали), чтобы строить опоры зажатием кнопки мыши без зазоров.