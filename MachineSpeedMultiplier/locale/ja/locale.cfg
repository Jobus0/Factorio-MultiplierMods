[mod-name]
MachineSpeedMultiplier=マシン速度倍率

[mod-description]
MachineSpeedMultiplier=シンプルな倍率設定により、様々なマシンの動作速度を一括して調整できます。

[mod-setting-name]
MachineSpeedMultiplier-assembling-machine-speed-factor=組立機の速度倍率
MachineSpeedMultiplier-furnace-speed-factor=炉の速度倍率
MachineSpeedMultiplier-lab-speed-factor=研究所の速度倍率
MachineSpeedMultiplier-mining-drill-speed-factor=掘削機・ポンプジャックの速度倍率
MachineSpeedMultiplier-rocket-silo-speed-factor=ロケットサイロの速度倍率
MachineSpeedMultiplier-inserter-speed-factor=インサーターの速度倍率

[mod-setting-description]
MachineSpeedMultiplier-assembling-machine-speed-factor=原油精製所、化学プラント、遠心分離機、バイオチャンバーも含みます。
MachineSpeedMultiplier-furnace-speed-factor=鋳造炉とリサイクラーも含みます。