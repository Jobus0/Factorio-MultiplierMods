[mod-name]
MachineSpeedMultiplier=기계 속도 배율

[mod-description]
MachineSpeedMultiplier=간단한 배율 조정을 통해 다양한 기계 유형의 작업 속도를 전역적으로 변경합니다.

[mod-setting-name]
MachineSpeedMultiplier-assembling-machine-speed-factor=조립 기계 속도 배율
MachineSpeedMultiplier-furnace-speed-factor=용광로 속도 배율
MachineSpeedMultiplier-lab-speed-factor=연구소 연구 속도 배율
MachineSpeedMultiplier-mining-drill-speed-factor=채광 드릴 / 시추기 속도 배율
MachineSpeedMultiplier-rocket-silo-speed-factor=로켓 격납고 속도 배율
MachineSpeedMultiplier-inserter-speed-factor=투입기 속도 배율

[mod-setting-description]
MachineSpeedMultiplier-assembling-machine-speed-factor=정유 공장, 화학 공장, 원심 분리기, 바이오 챔버도 포함됩니다.
MachineSpeedMultiplier-furnace-speed-factor=주조소와 재활용기도 포함됩니다.