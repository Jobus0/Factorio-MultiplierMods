[mod-name]
MachineSpeedMultiplier=Multiplicador de velocidad de las máquinas

[mod-description]
MachineSpeedMultiplier=Ajusta de forma global la velocidad de trabajo de diferentes tipos de máquinas mediante multiplicadores sencillos.

[mod-setting-name]
MachineSpeedMultiplier-assembling-machine-speed-factor=Factor de velocidad de la máquina de ensamblaje
MachineSpeedMultiplier-furnace-speed-factor=Factor de velocidad del horno
MachineSpeedMultiplier-lab-speed-factor=Factor de velocidad de investigación del laboratorio
MachineSpeedMultiplier-mining-drill-speed-factor=Factor de velocidad de la perforadora / bomba extractora
MachineSpeedMultiplier-rocket-silo-speed-factor=Factor de velocidad del silo de cohetes
MachineSpeedMultiplier-inserter-speed-factor=Factor de velocidad del insertador

[mod-setting-description]
MachineSpeedMultiplier-assembling-machine-speed-factor=También incluye la refinería de petróleo, la planta química, la centrifugadora y la biocámara.
MachineSpeedMultiplier-furnace-speed-factor=También incluye la fundición y el reciclador.