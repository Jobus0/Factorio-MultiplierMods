[mod-name]
MachineSpeedMultiplier=Multiplicateur de vitesse des machines

[mod-description]
MachineSpeedMultiplier=Ajustez globalement la vitesse de fonctionnement de différents types de machines à l'aide de simples multiplicateurs.

[mod-setting-name]
MachineSpeedMultiplier-assembling-machine-speed-factor=Facteur de vitesse des machines d'assemblage
MachineSpeedMultiplier-furnace-speed-factor=Facteur de vitesse des fours
MachineSpeedMultiplier-lab-speed-factor=Facteur de vitesse des laboratoires
MachineSpeedMultiplier-mining-drill-speed-factor=Facteur de vitesse des foreuses / chevalets de pompage
MachineSpeedMultiplier-rocket-silo-speed-factor=Facteur de vitesse des silos à fusée
MachineSpeedMultiplier-inserter-speed-factor=Facteur de vitesse des bras robotisés

[mod-setting-description]
MachineSpeedMultiplier-assembling-machine-speed-factor=Inclut également les raffineries, les usines de produits chimiques, les centrifugeuses et les chambres biologiques
MachineSpeedMultiplier-furnace-speed-factor=Inclut également les fonderies et les recycleurs