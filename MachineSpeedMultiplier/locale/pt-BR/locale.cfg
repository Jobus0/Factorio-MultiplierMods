[mod-name]
MachineSpeedMultiplier=Multiplicador de Velocidade das Máquinas

[mod-description]
MachineSpeedMultiplier=Ajuste globalmente a velocidade de funcionamento de diferentes tipos de máquinas com multiplicadores simples.

[mod-setting-name]
MachineSpeedMultiplier-assembling-machine-speed-factor=Fator de velocidade da máquina de montagem
MachineSpeedMultiplier-furnace-speed-factor=Fator de velocidade da fornalha
MachineSpeedMultiplier-lab-speed-factor=Fator de velocidade de pesquisa do laboratório
MachineSpeedMultiplier-mining-drill-speed-factor=Fator de velocidade da mineradora / bomba de sucção
MachineSpeedMultiplier-rocket-silo-speed-factor=Fator de velocidade do silo de foguete
MachineSpeedMultiplier-inserter-speed-factor=Fator de velocidade do insersor

[mod-setting-description]
MachineSpeedMultiplier-assembling-machine-speed-factor=Também inclui Refinaria de petróleo, Usina química, Centrífuga e Biocâmara.
MachineSpeedMultiplier-furnace-speed-factor=Também inclui Fundição e Reciclador.