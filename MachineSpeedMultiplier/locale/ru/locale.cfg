[mod-name]
MachineSpeedMultiplier=Множитель скорости машин

[mod-description]
MachineSpeedMultiplier=Глобальная настройка скорости работы различных типов машин с помощью простых множителей.

[mod-setting-name]
MachineSpeedMultiplier-assembling-machine-speed-factor=Множитель скорости сборочных автоматов
MachineSpeedMultiplier-furnace-speed-factor=Множитель скорости печей
MachineSpeedMultiplier-lab-speed-factor=Множитель скорости исследований в лабораториях
MachineSpeedMultiplier-mining-drill-speed-factor=Множитель скорости буров / насосных станций
MachineSpeedMultiplier-rocket-silo-speed-factor=Множитель скорости ракетных шахт
MachineSpeedMultiplier-inserter-speed-factor=Множитель скорости манипуляторов

[mod-setting-description]
MachineSpeedMultiplier-assembling-machine-speed-factor=Также включает в себя нефтеперерабатывающие заводы, химические заводы, центрифуги и биокамеры
MachineSpeedMultiplier-furnace-speed-factor=Также включает в себя литейные и переработчики